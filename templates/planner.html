<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner - FocusPulse</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>

<body class="bg-gray-50">

    <nav class="navbar">
        <div class="logo">FocusPulse</div>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('planner') }}">Planner</a>
            <a href="{{ url_for('focus') }}">Focus Mode</a>
            <a href="{{ url_for('wellness') }}">Wellness</a>
            <a href="{{ url_for('logout') }}">Logout</a>
            <button id="themeToggleBtn" class="btn btn-secondary theme-btn" title="Toggle Theme" style="padding: 8px; border-radius: 50%; width: 36px; height: 36px; display: inline-flex; align-items: center; justify-content: center; margin-left: 10px; font-size: 16px;">🌙</button>
        </div>
    </nav>

    <div class="calendar-app-layout">
        <!-- Sidebar -->
        <aside class="calendar-sidebar">
            <button class="btn create-task-btn" id="openTaskModalBtn">+ Create Task</button>
            <div class="sidebar-section">
                <h3>Today's Tasks</h3>
                <ul id="sidebar-today-list" class="sidebar-task-list"></ul>
            </div>
            <div class="sidebar-section">
                <h3>Upcoming</h3>
                <ul id="sidebar-upcoming-list" class="sidebar-task-list"></ul>
            </div>
        </aside>

        <!-- Main Calendar Area -->
        <main class="calendar-main">
            <div id="calendar" class="fc-custom-theme"></div>
        </main>
    </div>

    <!-- Task Modal -->
    <div id="taskModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3 id="modalTitle">New Task</h3>
                <button class="close-btn" id="closeTaskModalBtn">&times;</button>
            </div>
            <form id="taskForm">
                <input type="hidden" id="taskId">
                <div class="form-group">
                    <input type="text" id="taskTitleInput" placeholder="Task Title" required>
                </div>
                <div class="form-group">
                    <textarea id="taskDescInput" placeholder="Description..."></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="taskDateInput" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Time</label>
                        <input type="time" id="taskStartTimeInput">
                    </div>
                    <div class="form-group">
                        <label>End Time</label>
                        <input type="time" id="taskEndTimeInput">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Priority</label>
                        <select id="taskPriorityInput">
                            <option value="High">High</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="taskCategoryInput">
                            <option value="Study">Study</option>
                            <option value="Exam">Exam</option>
                            <option value="Assignment">Assignment</option>
                            <option value="Personal">Personal</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" style="align-items: center; justify-content: space-between;">
                    <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                        <label style="margin:0;">Color</label>
                        <input type="color" id="taskColorInput" value="#4F46E5" style="padding:0; width:40px; height:30px; border:none; border-radius:4px; cursor:pointer;">
                    </div>
                    <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="taskCompleteInput" style="width: auto;">
                        <label for="taskCompleteInput" style="margin: 0;">Completed</label>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary delete-btn" id="deleteTaskBtn" style="display:none; color: white;">Delete</button>
                    <button type="submit" class="btn btn-primary">Save Task</button>
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/advanced-calendar.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
</body>

</html>
